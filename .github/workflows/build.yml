name: Build Unpathetic Hell
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Позволяет запускать сборку вручную

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: Unpathetic-Hell-Windows
            executable_extension: .exe
            sep: ";"
          - os: ubuntu-latest
            artifact_name: Unpathetic-Hell-Linux
            executable_extension: ""
            sep: ":"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pgzero pgzhelper pyinstaller

    - name: Build with PyInstaller
      # Мы добавляем pgzhelper.py как скрытый импорт и копируем папки ресурсов
      # Важно: если у тебя есть папки images, sounds, fonts - они попадут в билд
      run: |
        pyinstaller --onefile --noconsole \
        --name "Unpathetic-Hell${{ matrix.executable_extension }}" \
        --add-data "images${{ matrix.sep }}images" \
        --add-data "sounds${{ matrix.sep }}sounds" \
        --collect-all pgzero \
        main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/Unpathetic-Hell${{ matrix.executable_extension }}
