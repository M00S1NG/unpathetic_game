name: Build Unpathetic Hell (Windows Only)
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install pgzero pgzhelper pyinstaller

    - name: Build with PyInstaller
      # Собираем только для Windows
      run: |
        pyinstaller --onefile --noconsole --name "Unpathetic-Hell" --add-data "images;images" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Unpathetic-Hell-Windows
        path: dist/Unpathetic-Hell.exe
