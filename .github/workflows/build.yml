name: Build AppImage and Windows EXE
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pgzero pgzhelper pyinstaller

    - name: Build Windows EXE
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --onefile --noconsole --name "Unpathetic-Hell" --add-data "images;images" main.py

    - name: Build Linux AppImage
      if: matrix.os == 'ubuntu-latest'
      run: |
        # 1. Собираем обычный бинарник через PyInstaller
        pyinstaller --onefile --name "unpathetic-hell" --add-data "images:images" main.py
        
        # 2. Подготовка структуры AppDir
        mkdir -p AppDir/usr/bin
        cp dist/unpathetic-hell AppDir/usr/bin/
        
        # 3. Создаем необходимые файлы для AppImage (заглушки)
        echo '[Desktop Entry]\nName=Unpathetic Hell\nExec=unpathetic-hell\nIcon=icon\nType=Application\nCategories=Game;' > AppDir/unpathetic-hell.desktop
        touch AppDir/icon.png # Можно заменить на реальную иконку позже
        
        # 4. Скачиваем и запускаем appimagetool
        wget https://github.com/AppImage/AppImageKit/releases/download/13/appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage
        ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir Unpathetic-Hell.AppImage

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Unpathetic-Hell-${{ matrix.os }}
        path: |
          dist/Unpathetic-Hell.exe
          Unpathetic-Hell.AppImage